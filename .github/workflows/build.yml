name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tarot_user
          POSTGRES_PASSWORD: tarot_password
          POSTGRES_DB: tarot_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Frontend build
      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      # Backend build
      - name: Install backend dependencies
        run: cd server && npm install

      - name: Setup database
        env:
          DATABASE_URL: postgresql://tarot_user:tarot_password@localhost:5432/tarot_db?schema=public
        run: cd server && npx prisma migrate deploy --skip-generate

      - name: Verify backend setup
        run: cd server && npm run prisma:generate
